name: Museum
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"

settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.yourname.museum
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    DEVELOPMENT_TEAM: ""  # 填入你的 Apple Developer Team ID

targets:
  Museum:
    type: application
    platform: iOS
    sources:
      - Museum
      - path: MuseumData
        type: folder
        name: MuseumData
    resources:
      - Museum/Resources
    info:
      path: Museum/Info.plist
      properties:
        CFBundleDisplayName: "中国博物馆"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSLocationWhenInUseUsageDescription: "用于在地图上显示附近的博物馆"
        UILaunchStoryboardName: LaunchScreen
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        "UISupportedInterfaceOrientations~ipad":
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  MuseumTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MuseumTests
    dependencies:
      - target: Museum
    settings:
      base:
        SWIFT_VERSION: "5.9"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Museum.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Museum"
        BUNDLE_LOADER: "$(TEST_HOST)"
